<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Types - ECOBANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 4px;
            position: relative;
        }

        .nav a h3 {
            margin: 0;
            display: flex;
            align-items: center;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #b2ff59;
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        
        .nav a:hover::after {
            transform: scaleX(1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #loginButtons {
            display: flex;
            gap: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 15px;
        }

        .user-profile:hover {
            background: #3a4149;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59, #7ac943);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 12px;
        }

        .user-name {
            font-size: 13px;
            color: #eaecef;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #2b3139;
            color: #f6465d;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f6465d;
            color: #fff;
            border-color: #f6465d;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            animation: slideUp 0.5s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .page-subtitle {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out 0.3s both;
        }

        .sorting-section {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            animation: slideUp 0.5s ease-out 0.4s both;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid #2b3139;
            color: #eaecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .sort-btn:hover,
        .sort-btn.active {
            border-color: #b2ff59;
            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
        }

        .trash-table {
            width: 100%;
            border-collapse: collapse;
            animation: slideUp 0.5s ease-out 0.5s both;
        }

        .trash-table thead {
            background: #1e2329;
            border-bottom: 2px solid #2b3139;
        }

        .trash-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #b2ff59;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trash-table td {
            padding: 15px;
            border-bottom: 1px solid #2b3139;
            font-size: 13px;
        }

        .trash-table tbody tr {
            transition: all 0.3s ease;
        }

        .trash-table tbody tr:hover {
            background: rgba(178, 255, 89, 0.05);
        }

        .trash-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .trash-name {
            font-weight: 600;
            color: #eaecef;
            display: flex;
            align-items: center;
        }

        .trash-category {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .price-cell {
            font-weight: 700;
            color: #b2ff59;
        }

        .change-cell {
            font-weight: 600;
        }

        .change-cell.positive {
            color: #0ecb81;
        }

        .change-cell.negative {
            color: #f6465d;
        }

        .chart-mini {
            display: inline-block;
            width: 100px;
            height: 30px;
            background: #0b0e11;
            border-radius: 4px;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #b2ff59;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2b3139;
            border-top-color: #b2ff59;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #848e9c;
        }

        .table-wrapper {
            background: #1e2329;
            border-radius: 12px;
            border: 1px solid #2b3139;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            .trash-table {
                font-size: 12px;
            }

            .trash-table th,
            .trash-table td {
                padding: 12px;
            }

            .trash-icon {
                font-size: 20px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .sorting-section {
                gap: 8px;
            }

            .sort-btn {
                padding: 6px 12px;
                font-size: 11px;
            }

            .trash-table th,
            .trash-table td {
                padding: 10px;
                font-size: 12px;
            }

            .trash-icon {
                font-size: 18px;
            }

            .chart-mini {
                width: 80px;
                height: 25px;
            }
        }

        /* Mobile Responsive Design */
        @media (max-width: 1200px) {
            .market-cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 10px 12px;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
                justify-content: space-between;
            }

            .header-left {
                gap: 10px;
                flex: 0 0 auto;
            }

            .logo {
                font-size: 18px;
            }

            .nav {
                gap: 8px;
                display: none;
            }

            .nav.show {
                display: flex;
            }

            .nav a {
                font-size: 12px;
                padding: 4px 6px;
            }

            .nav a h3 {
                font-size: 11px;
            }

            .header-right {
                gap: 8px;
                flex-wrap: wrap;
            }

            .btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            .user-profile {
                padding: 6px 10px;
            }

            .user-name {
                max-width: 80px;
                font-size: 12px;
            }

            .container {
                padding: 15px;
            }

            .market-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .login-required-section {
                padding: 40px 20px;
            }

            .login-required-title {
                font-size: 24px;
            }

            .features-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
                gap: 5px;
            }

            .header-left {
                gap: 8px;
            }

            .logo {
                font-size: 16px;
            }

            .nav {
                display: none;
            }

            .header-right {
                gap: 5px;
            }

            .btn {
                padding: 4px 8px;
                font-size: 10px;
            }

            .user-profile {
                padding: 5px 8px;
                gap: 5px;
            }

            .user-avatar {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            .user-name {
                display: none;
            }

            .container {
                padding: 10px;
            }

            .market-cards {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .login-required-section {
                padding: 30px 15px;
                border-radius: 8px;
            }

            .lock-icon {
                font-size: 48px;
            }

            .login-required-title {
                font-size: 20px;
            }

            .features-list {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">🌿 ECOBANK</div>
            <div class="nav">
                <a href="index.html"><h3>Home</h3></a>
                <a href="trash_types.html"><h3>Type</h3></a>
                <a href="exchange.html"><h3>Exchange</h3></a>
                <a href="wallet.html"><h3>Wallet</h3></a>
                <a href="booths.html"><h3>Booths</h3></a>
            </div>
        </div>
        <div class="header-right" id="headerRight"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-title">📊 Trash Types & Prices</div>
        <div class="page-subtitle">ราคาปัจจุบันและแนวโน้มของเศษขยะทั้งหมด</div>

        <!-- Sorting Options -->
        <div class="sorting-section">
            <button class="sort-btn active" onclick="sortBy('price-desc')">📈 ราคาสูงสุด</button>
            <button class="sort-btn" onclick="sortBy('price-asc')">📉 ราคาต่ำสุด</button>
            <button class="sort-btn" onclick="sortBy('change-positive')">🟢 เพิ่มขึ้น</button>
            <button class="sort-btn" onclick="sortBy('change-negative')">🔴 ลดลง</button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table class="trash-table">
                <thead>
                    <tr>
                        <th style="width: 35%;">ชื่อขยะ</th>
                        <th style="width: 15%;">ราคาปัจจุบัน</th>
                        <th style="width: 15%;">การเปลี่ยนแปลง</th>
                        <th style="width: 15%;">หมวดหมู่</th>
                        <th style="width: 20%;">แนวโน้ม</th>
                    </tr>
                </thead>
                <tbody id="trashTableBody">
                    <tr>
                        <td colspan="5" class="loading">
                            <span class="spinner"></span>
                            <span>กำลังโหลดข้อมูล...</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { 
            getTrashTypes
        } from "../js/firebase-service.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;
        let allTrash = [];
        let currentSort = 'price-desc';
        const auth = getAuth();

        onAuthStateChanged(auth, async (user) => {
            // Trash types page accessible to guests
            if (user) {
                currentUser = user;
                const userData = JSON.parse(localStorage.getItem('ecobank_user'));
                setupHeader(userData);
            } else {
                setupGuestHeader();
            }

            await loadTrashTypes();
        });

        function setupHeader(userData) {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(userData?.name || 'U')[0].toUpperCase()}</div>
                    <span>${userData?.name || 'User'}</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('ecobank_user');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        }

        function setupGuestHeader() {
            // Guest view
        }

        async function loadTrashTypes() {
            try {
                allTrash = await getTrashTypes();
                renderTable();
            } catch (error) {
                console.error('Error loading trash types:', error);
                document.getElementById('trashTableBody').innerHTML = `
                    <tr><td colspan="5" class="empty-state">เกิดข้อผิดพลาด: ${error.message}</td></tr>
                `;
            }
        }

        window.sortBy = function(sortType) {
            currentSort = sortType;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        };

        function getSortedTrash() {
            let sorted = [...allTrash];

            switch (currentSort) {
                case 'price-desc':
                    sorted.sort((a, b) => (b.price_per_unit || 0) - (a.price_per_unit || 0));
                    break;
                case 'price-asc':
                    sorted.sort((a, b) => (a.price_per_unit || 0) - (b.price_per_unit || 0));
                    break;
                case 'change-positive':
                    sorted.sort((a, b) => (b.week_change || 0) - (a.week_change || 0));
                    break;
                case 'change-negative':
                    sorted.sort((a, b) => (a.week_change || 0) - (b.week_change || 0));
                    break;
                default:
                    break;
            }

            return sorted;
        }

        function renderTable() {
            const tbody = document.getElementById('trashTableBody');
            const sorted = getSortedTrash();

            if (sorted.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">ไม่มีข้อมูลขยะ</td></tr>';
                return;
            }

            tbody.innerHTML = sorted.map(trash => {
                const price = trash.price_per_unit || 0;
                const weekChange = trash.week_change || 0;
                const changePercent = trash.change_percent || 0;
                const changeClass = weekChange >= 0 ? 'positive' : 'negative';
                const changeIcon = weekChange >= 0 ? '📈' : '📉';

                return `
                    <tr>
                        <td>
                            <div class="trash-name">
                                <span class="trash-icon">${trash.icon || '📦'}</span>
                                <div>
                                    <div>${trash.name}</div>
                                </div>
                            </div>
                        </td>
                        <td class="price-cell">${price.toFixed(2)} ฿/kg</td>
                        <td class="change-cell ${changeClass}">
                            ${changeIcon} ${weekChange > 0 ? '+' : ''}${weekChange.toFixed(2)} (${changePercent > 0 ? '+' : ''}${changePercent.toFixed(1)}%)
                        </td>
                        <td>
                            <span class="trash-category">${trash.category}</span>
                        </td>
                        <td>
                            <canvas class="chart-mini" data-price="${price}"></canvas>
                        </td>
                    </tr>
                `;
            }).join('');

            // Draw mini charts
            document.querySelectorAll('.chart-mini').forEach(canvas => {
                drawMiniChart(canvas);
            });
        }

        function drawMiniChart(canvas) {
            const ctx = canvas.getContext('2d');
            const price = parseFloat(canvas.getAttribute('data-price'));
            
            // Simple trend visualization
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.fillStyle = '#0b0e11';
            ctx.fillRect(0, 0, width, height);
            
            // Draw trend line
            ctx.strokeStyle = '#b2ff59';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, height * 0.6);
            ctx.lineTo(width * 0.25, height * 0.5);
            ctx.lineTo(width * 0.5, height * 0.55);
            ctx.lineTo(width * 0.75, height * 0.4);
            ctx.lineTo(width, height * 0.45);
            ctx.stroke();
            
            // Fill area
            ctx.fillStyle = 'rgba(178, 255, 89, 0.2)';
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fill();
        }

        window.sortBy = sortBy;
    </script>
</body>
</html>
