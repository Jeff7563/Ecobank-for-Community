<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - ECOBANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(178, 255, 89, 0.5);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #eaecef;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59, #0ecb81);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .logout-btn {
            background: #f6465d;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e03545;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            animation: slideUp 0.5s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out 0.3s both;
        }

        .wallet-card {
            background: #1e2329;
            border: 1px solid #2b3139;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .wallet-card:hover {
            border-color: #b2ff59;
            box-shadow: 0 8px 24px rgba(178, 255, 89, 0.1);
            transform: translateY(-2px);
        }

        .card-label {
            font-size: 12px;
            color: #848e9c;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: #eaecef;
        }

        .card-value.balance {
            color: #b2ff59;
        }

        .portfolio-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #2b3139;
            animation: slideUp 0.5s ease-out 0.4s both;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #eaecef;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .portfolio-item {
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .portfolio-item:hover {
            border-color: #b2ff59;
            box-shadow: 0 4px 12px rgba(178, 255, 89, 0.2);
            transform: translateY(-2px);
        }

        .portfolio-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .portfolio-name {
            font-size: 13px;
            font-weight: 600;
            color: #eaecef;
            margin-bottom: 8px;
        }

        .portfolio-quantity {
            font-size: 14px;
            font-weight: 700;
            color: #b2ff59;
        }

        .empty-portfolio {
            text-align: center;
            padding: 40px 20px;
            color: #848e9c;
        }

        .transaction-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2b3139;
            animation: slideUp 0.5s ease-out 0.5s both;
        }

        .transaction-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #2b3139;
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            background: rgba(178, 255, 89, 0.05);
            padding-left: 10px;
            padding-right: 10px;
            margin-left: -10px;
            margin-right: -10px;
            border-radius: 6px;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-title {
            font-size: 14px;
            font-weight: 600;
            color: #eaecef;
        }

        .transaction-date {
            font-size: 12px;
            color: #848e9c;
            margin-top: 4px;
        }

        .transaction-amount {
            font-size: 15px;
            font-weight: 700;
        }

        .transaction-amount.income {
            color: #0ecb81;
        }

        .transaction-amount.expense {
            color: #f6465d;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-deposit {
            background: #0ecb81;
            color: white;
        }

        .btn-deposit:hover {
            background: #0bb572;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 203, 129, 0.3);
        }

        .btn-withdraw {
            background: #f0b90b;
            color: #000;
        }

        .btn-withdraw:hover {
            background: #ffc419;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 185, 11, 0.3);
        }

        .btn-exchange {
            background: #b2ff59;
            color: #000;
        }

        .btn-exchange:hover {
            background: #c0ee8c;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(178, 255, 89, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b2ff59;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2b3139;
            border-top-color: #b2ff59;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .wallet-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .portfolio-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .wallet-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">🌿 ECOBANK</div>
            <div class="nav">
                <a href="index.html">Home</a>
                <a href="trash_types.html">Type</a>
                <a href="exchange.html">Exchange</a>
                <a href="wallet.html" style="color: #b2ff59;">Wallet</a>
                <a href="booths.html">Booths</a>
            </div>
        </div>
        <div class="header-right" id="headerRight"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-title">💰 My Wallet</div>

        <!-- Wallet Stats -->
        <div class="wallet-grid">
            <div class="wallet-card">
                <div class="card-label">💸 ยอดคงเหลือ</div>
                <div class="card-value balance" id="totalBalance">0 ฿</div>
            </div>
            <div class="wallet-card">
                <div class="card-label">📦 รวมน้ำหนักขยะ</div>
                <div class="card-value" id="totalWeight">0 kg</div>
            </div>
            <div class="wallet-card">
                <div class="card-label">🛒 รายการในตะกร้า</div>
                <div class="card-value" id="itemCount">0</div>
            </div>
        </div>

        <!-- Portfolio Section -->
        <div class="portfolio-section">
            <div class="section-title">
                <span>📦 Portfolio ของคุณ</span>
                <span style="font-size: 12px; color: #848e9c; margin-left: auto;" id="portfolioLoadingStatus"></span>
            </div>
            <div class="portfolio-grid" id="portfolioGrid">
                <div class="loading">
                    <span class="spinner"></span>
                    <span>กำลังโหลดข้อมูล...</span>
                </div>
            </div>
        </div>

        <!-- Transaction History Section -->
        <div class="transaction-section">
            <div class="section-title">📊 ประวัติธุรกรรม</div>
            <div class="transaction-list" id="transactionList">
                <div class="loading">
                    <span class="spinner"></span>
                    <span>กำลังโหลดข้อมูล...</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="exchange.html" class="btn btn-exchange">🛒 ซื้อขยะ</a>
            <button class="btn btn-deposit" id="depositBtn" onclick="goToDeposit()">💳 ฝากเงิน</button>
            <button class="btn btn-withdraw" id="withdrawBtn" onclick="goToWithdraw()">💸 ถอนเงิน</button>
        </div>
    </div>

    <script type="module">
        import { 
            getUserWallet, 
            getUserTransactions,
            getTrashTypeById
        } from "../js/firebase-service.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;
        const auth = getAuth();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;
            const userData = JSON.parse(localStorage.getItem('ecobank_user'));
            setupHeader(userData);
            
            await loadWalletData();
        });

        function setupHeader(userData) {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(userData?.name || 'U')[0].toUpperCase()}</div>
                    <span>${userData?.name || 'User'}</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('ecobank_user');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        }

        async function loadWalletData() {
            try {
                // Load wallet info
                const wallet = await getUserWallet(currentUser.uid);
                
                if (!wallet) {
                    document.getElementById('totalBalance').textContent = '0 ฿';
                    document.getElementById('totalWeight').textContent = '0 kg';
                    document.getElementById('itemCount').textContent = '0';
                    document.getElementById('portfolioGrid').innerHTML = '<div class="empty-portfolio">ไม่มีรายการในportfolio</div>';
                    document.getElementById('transactionList').innerHTML = '<div class="empty-portfolio">ไม่มีประวัติธุรกรรม</div>';
                    return;
                }

                // Update balance
                document.getElementById('totalBalance').textContent = wallet.balance.toLocaleString('th-TH', { maximumFractionDigits: 2 }) + ' ฿';

                // Calculate portfolio stats
                const portfolio = wallet.portfolio || {};
                let totalWeight = 0;
                let itemCount = 0;

                // Display portfolio items
                if (Object.keys(portfolio).length === 0) {
                    document.getElementById('portfolioGrid').innerHTML = '<div class="empty-portfolio">ยังไม่มีขยะในportfolio</div>';
                } else {
                    const portfolioHTML = await Promise.all(
                        Object.entries(portfolio).map(async ([trashId, quantity]) => {
                            try {
                                const trash = await getTrashTypeById(trashId);
                                totalWeight += quantity;
                                itemCount++;
                                
                                return `
                                    <div class="portfolio-item">
                                        <div class="portfolio-icon">${trash.icon || '📦'}</div>
                                        <div class="portfolio-name">${trash.name}</div>
                                        <div class="portfolio-quantity">${quantity} kg</div>
                                    </div>
                                `;
                            } catch (error) {
                                console.error('Error loading trash:', error);
                                return '';
                            }
                        })
                    );

                    document.getElementById('portfolioGrid').innerHTML = portfolioHTML.join('');
                }

                document.getElementById('totalWeight').textContent = totalWeight.toFixed(2) + ' kg';
                document.getElementById('itemCount').textContent = itemCount;

                // Load transactions
                const transactions = await getUserTransactions(currentUser.uid, 20);
                
                if (transactions.length === 0) {
                    document.getElementById('transactionList').innerHTML = '<div class="empty-portfolio">ไม่มีประวัติธุรกรรม</div>';
                } else {
                    const transactionHTML = transactions.map(tx => {
                        const isIncome = tx.type === 'buy' || tx.type === 'deposit';
                        const icon = {
                            'buy': '🛒',
                            'sell': '📦',
                            'deposit': '💳',
                            'withdraw': '💸'
                        }[tx.type] || '📊';

                        const typeLabel = {
                            'buy': 'ซื้อขยะ',
                            'sell': 'ขายขยะ',
                            'deposit': 'ฝากเงิน',
                            'withdraw': 'ถอนเงิน'
                        }[tx.type] || tx.type;

                        const date = new Date(tx.timestamp?.toDate ? tx.timestamp.toDate() : tx.timestamp).toLocaleString('th-TH');

                        return `
                            <div class="transaction-item">
                                <div class="transaction-info">
                                    <div class="transaction-title">${icon} ${typeLabel}${tx.trash_name ? ' - ' + tx.trash_name : ''}</div>
                                    <div class="transaction-date">${date}</div>
                                </div>
                                <div class="transaction-amount ${isIncome ? 'income' : 'expense'}">
                                    ${isIncome ? '+' : '-'}${tx.amount.toFixed(2)} ฿
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('transactionList').innerHTML = transactionHTML;
                }

                document.getElementById('portfolioLoadingStatus').textContent = `เพิ่มเติมเมื่อ ${new Date().toLocaleTimeString('th-TH')}`;

            } catch (error) {
                console.error('Error loading wallet:', error);
                document.getElementById('portfolioGrid').innerHTML = `<div class="empty-portfolio">เกิดข้อผิดพลาด: ${error.message}</div>`;
                document.getElementById('transactionList').innerHTML = `<div class="empty-portfolio">เกิดข้อผิดพลาด: ${error.message}</div>`;
            }
        }

        window.goToDeposit = function() {
            window.location.href = 'deposit.html';
        };

        window.goToWithdraw = function() {
            window.location.href = 'withdrawal.html';
        };

        // Refresh data every 5 seconds
        setInterval(() => {
            if (currentUser) {
                loadWalletData();
            }
        }, 5000);
    </script>
</body>
</html>
