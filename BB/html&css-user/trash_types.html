            padding: 0;
            box-sizing: border-box;
        }

        body {

            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 4px;
            position: relative;
        }

        .nav a h3 {
            margin: 0;
            display: flex;
            align-items: center;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #b2ff59;
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .nav a:hover::after {
            transform: scaleX(1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #848e9c;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 8px;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .icon-btn:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login {
            background: transparent;
            color: #eaecef;
            border: 1px solid #2b3139;
            padding: 8px 14px;
        }

        .btn-login:hover {
            background-color: rgba(178, 255, 89, 0.1);
            border-color: #b2ff59;
            color: #b2ff59;
        }

        .btn-signup {
            background: #b2ff59;
            color: #000;
            font-weight: 600;
        }

        .btn-signup:hover {
            background: #c8ff6a;
            box-shadow: 0 4px 12px rgba(178, 255, 89, 0.3);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        .main-tabs {
            display: flex;
            gap: 30px;
            margin: 20px 0 30px 0;
            border-bottom: 1px solid #2b3139;
        }

        .main-tab {
            padding: 10px 0;
            color: #848e9c;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 15px;
            text-decoration: none;
        }

        .main-tab.active {
            color: #eaecef;
            border-bottom-color: #b2ff59;
        }

        .main-tab:hover {
            color: #eaecef;
        }

        .sub-tabs {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 8px 16px;
            background: #2b3139;
            color: #848e9c;
            cursor: pointer;
            border: 1px solid #2b3139;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .sub-tab.active {
            background: #b2ff59;
            color: #000;
            border-color: #b2ff59;
        }

        .sub-tab:hover {
            border-color: #b2ff59;
            color: #eaecef;
        }

        .table-container {
            background: #1e2329;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header-section {
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #2b3139;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .dropdown {
            background: #2b3139;
            color: #eaecef;
            border: 1px solid #474d57;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: center;
            padding: 15px 20px;
            color: #848e9c;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 1px solid #2b3139;
        }

        th:first-child {
            text-align: left;
        }

        td {
            text-align: center;
            padding: 15px 20px;
            border-bottom: 1px solid #2b3139;
        }

        td:first-child {
            text-align: left;
        }

        tr:hover {
            background: #23262f;
        }

        .trash-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trash-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
        }

        .trash-icon img {  
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .trash-symbol {
            color: #848e9c;
            font-size: 12px;
        }

        .price-value {
            font-size: 14px;
            font-weight: 500;
        }

        .change {
            font-size: 13px;
            font-weight: 500;
        }

        .positive {
            color: #0ecb81;
        }

        .negative {
            color: #f6465d;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .page-btn {
            padding: 8px 12px;
            background: #2b3139;
            border: none;
            color: #eaecef;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: #3a4149;
        }

        .page-btn.active {
            background: #b2ff59;
            color: #000;
        }

        let currentTab = 'today';
        let currentCategory = 'all';

        function renderTable() {
            const container = document.getElementById('cardsContainer');
            let data = rankingData[currentTab];
            
            // Filter by category if not 'all'
            if (currentCategory !== 'all') {
                data = data.filter(item => item.category === currentCategory);
            }
            
            const periodText = {
                'today': 'วันนี้',
                'week': 'สัปดาห์',
                'month': 'เดือน',
                'year': 'ปี'
            };
            
            const rows = data.map((item, index) => {
                const changeClass = item.change >= 0 ? 'positive' : 'negative';
                const changeSymbol = item.change >= 0 ? '+' : '';
                
                return `
                    <tr>
                        <td>
                            <div class="trash-cell">
                                <div class="trash-icon">
                                    <img src="${item.iconImage}" alt="${item.name}">
                                </div>
                                <div>
                                    <div class="trash-name">${item.symbol}</div>
                                    <div class="trash-symbol">${item.name}</div>
                                </div>
                            </div>
                        </td>
                        <td>${item.category}</td>
                        <td class="price-value">${item.price.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td>${typeof item.week === 'number' ? item.week.toLocaleString('th-TH', {minimumFractionDigits: 2}) : item.week}</td>
                        <td>${typeof item.month === 'number' ? item.month.toLocaleString('th-TH', {minimumFractionDigits: 2}) : item.month}</td>
                        <td>${item.year}</td>
                        <td class="change ${changeClass}">${changeSymbol}${item.change}%</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="table-container">
                    <div class="table-header-section">
                        <span>🗂️ รายการขยะตามประเภท - ${periodText[currentTab]}</span>
                        <div class="header-controls">
                            <select class="dropdown" id="categoryFilter" value="${currentCategory}">
                                <option value="all" ${currentCategory === 'all' ? 'selected' : ''}>ทุกหมวดหมู่</option>
                                <option value="พลาสติก" ${currentCategory === 'พลาสติก' ? 'selected' : ''}>พลาสติก</option>
                                <option value="กระดาษ" ${currentCategory === 'กระดาษ' ? 'selected' : ''}>กระดาษ</option>
                                <option value="โลหะ" ${currentCategory === 'โลหะ' ? 'selected' : ''}>โลหะ</option>  
                                <option value="แก้ว" ${currentCategory === 'แก้ว' ? 'selected' : ''}>แก้ว</option>
                            </select>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price <div style="font-size: 10px; ">/kg</div></th></th>
                                <th>Week</th>
                                <th>Month</th>
                                <th>Year</th>
                                <th>Market Cap <div style="font-size: 10px; ">/ Year</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn">...</button>
                        <button class="page-btn">10</button>
                    </div>
                </div>
            `;

            // Pagination handlers
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.textContent === '...') return;
                    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        // Category filter handler - attach once outside renderTable
        document.addEventListener('change', function(e) {
            if (e.target.id === 'categoryFilter') {
                currentCategory = e.target.value;
                renderTable();
            }
        }, true);

        // Sub-tab handlers
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                currentTab = this.dataset.period;
                currentCategory = 'all'; // Reset category filter when changing period
                renderTable();
            });
        });

        // Initial render
        renderTable();
    </script>
