        let currentTab = 'today';

        function getTabTitle() {
            const titles = {
                'today': 'Today',
                'week': 'Week',
                'month': 'Month',
                'year': 'Year'
            };
            return titles[currentTab];
        }

        function renderTable() {
            const container = document.getElementById('cardsContainer');
            const data = rankingData[currentTab];
            
            const rows = data.map(crypto => {
                const changeClass = crypto.change >= 0 ? 'positive' : 'negative';
                const changeSymbol = crypto.change >= 0 ? '+' : '';
                
                let iconHTML;
                if (crypto.iconImage) {
                    iconHTML = `<img src="${crypto.iconImage}" alt="${crypto.symbol}" onerror="this.style.display='none'; this.parentElement.innerHTML='${crypto.icon}';">`;
                } else {
                    iconHTML = crypto.icon;
                }
                
                return `
                    <tr>
                        <td>
                            <div class="token-cell">
                                <div class="token-icon" style="background: ${crypto.color};">${iconHTML}</div>
                                <div>
                                    <div class="token-name">${crypto.symbol}</div>
                                    <div class="token-symbol">${crypto.name}</div>
                                </div>
                            </div>
                        </td>
                        <td class="price-value">${crypto.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td class="price-value">${crypto.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td>${crypto.volume}</td>
                        <td>${crypto.marketCap}</td>
                        <td class="change ${changeClass}">${changeSymbol}${crypto.change}%</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="table-container">
                    <div class="table-header-section">
                        <span>Top Trash by Market Capitalization</span>
                        <div class="header-controls">
                            <select class="dropdown">
                                <option>Type</option>
                                <option>BB</option>
                            </select>
                            <select class="dropdown" id="timeDropdown">
                                <option value="today" ${currentTab === 'today' ? 'selected' : ''}>Today</option>
                                <option value="week" ${currentTab === 'week' ? 'selected' : ''}>Week</option>
                                <option value="month" ${currentTab === 'month' ? 'selected' : ''}>Month</option>
                                <option value="year" ${currentTab === 'year' ? 'selected' : ''}>Year</option>
                            </select>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Week</th>
                                <th>Month</th>
                                <th>Market Cap <div style="font-size: 10px;">/ Year</div></th>

                        </thead>

                        </tbody>
                    </table>

                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn">4</button>
                        <button class="page-btn">5</button>
                        <button class="page-btn">...</button>
                        <button class="page-btn">15</button>
                    </div>
                </div>
            `;

            // Add event listener for time dropdown
            document.getElementById('timeDropdown').addEventListener('change', function(e) {
                currentTab = e.target.value;
                
                // Update sub-tab active state
                const tabs = ['today', 'week', 'month', 'year'];
                document.querySelectorAll('.sub-tab').forEach((tab, index) => {
                    tab.classList.toggle('active', tabs[index] === currentTab);
                });
                
                renderTable();
            });

            // Add pagination functionality
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        // Event listeners for sub-tabs
        document.querySelectorAll('.sub-tab').forEach((tab, index) => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                const tabs = ['today', 'week', 'month', 'year'];
                currentTab = tabs[index];
                renderTable();
            });
        });

        // Initial render
        renderTable();
