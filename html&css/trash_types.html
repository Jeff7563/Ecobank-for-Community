<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOBANK for Community</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .nav a:hover {
            color: #c0ee8c;
        }

        

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #848e9c;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: #eaecef;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-login {
            background: transparent;
            color: #eaecef;
        }

        .btn-signup {
            background: #b2ff59;
            color: #000;
            font-weight: 600;
        }

        .btn-signup:hover {
            background: #f8d12f;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        .container :hover {
            color: #eaecef;
        }

        .main-tabs {
            display: flex;
            gap: 30px;
            margin: 20px 0 30px 0;
            border-bottom: 1px solid #2b3139;
        }

        .main-tab {
            padding: 10px 0;
            color: #848e9c;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 15px;
            text-decoration: none;
        }

        .main-tab.active {
            color: #eaecef;
            border-bottom-color: #b2ff59;
        }

        .main-tab.active:hover {
            color: #f8d12f;
        }
        

        .market-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .market-card {
            background: #1e2329;
            padding: 20px;
            border-radius: 8px;
        }

        .card-header {
            color: #848e9c;
            font-size: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown {
            background: #2b3139;
            color: #eaecef;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .more-link {
            color: #f0b90b;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
        }

        .trash-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trash-item:last-child {
            margin-bottom: 0;
        }

        .trash-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trash-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            overflow: hidden;
        }

        .trash-icon img {  
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .trash-details {
            display: flex;
            flex-direction: column;
        }

        .trash-name {
            font-weight: 600;
            font-size: 14px;
            color: #eaecef;
        }

        .trash-price {
            font-size: 13px;
            color: #848e9c;
        }

        .trash-right {
            text-align: right;
        }

        .change {
            font-size: 13px;
            font-weight: 500;
        }

        .positive {
            color: #0ecb81;
        }

        .negative {
            color: #f6465d;
        }

        .secondary-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid #2b3139;
            overflow-x: auto;
        }

        .secondary-tab {
            padding: 10px 15px;
            color: #848e9c;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 14px;
            white-space: nowrap;
            position: relative;
        }

        .secondary-tab.active {
            color: rgb(255, 255, 255);
            border-bottom-color: #b2ff59;
        }

        .secondary-tab .badge {
            background: #f0b90b;
            color: #000;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: 600;
        }

        .secondary-tab:hover {
            color: #eaecef;
        }

        .secondary-tab.active:hover {
            color: #f0b90b;
        }


        .filter-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 6px 12px;
            background: #2b3139;
            border: 1px solid #2b3139;
            color: #848e9c;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            color: #eaecef;
            border-color: #474d57;
        }

        .filter-tab.active {
            background: #2b3139;
            color: #eaecef;
            border-color: #474d57;
        }

        .table-container {
            background: #1e2329;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #2b3139;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: center;
            padding: 15px 20px;
            color: #848e9c;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 1px solid #2b3139;
        }
        

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #2b3139;
            text-align: center;
        }

        td:first-child {
            text-align: left;    
        }

        tr:hover {
            background: #23262f;
        }

        .trash-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trash-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
        }

        .trash-icon img {  
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .trash-name {
            font-weight: 600;
        }

        .trash-symbol {
            color: #848e9c;
            font-size: 12px;
        }

        .price-value {
            font-size: 14px;
            font-weight: 500;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .page-btn {
            padding: 8px 12px;
            background: #2b3139;
            border: none;
            color: #eaecef;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: #3a4149;
        }

        .page-btn.active {
            background: #b2ff59;
            color: #000;
        }

        .search-notify {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
    
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">ECOBANK</div>
            <div class="nav">
                <a href="index.html"><h3>Home</h3></a>
                <a href="trash_types.html" ><h3>Type</h3></a>
                <a href="#" ><h3>Exchange </h3></a>
                <a href="#" ><h3>wallet</h3></a>
                <a href="#" ><h3>More</h3></a>
            </div>
        </div>
        <div class="header-right">
            <a href="login.html"><button class="btn btn-login">Log In</button></a>
            <a href="register.html"><button class="btn btn-signup">Sign Up</button></a>
        </div>
    </div>

    <div class="container">
        <div class="main-tabs">
            <a href="index.html" class="main-tab" >Overview</a>
            <a href="trash_types.html" class="main-tab active" >Types of Waste</a>
        </div>

        <div class="secondary-tabs">
            <div class="secondary-tab active">Today</div>
            <div class="secondary-tab ">Week</div>
            <div class="secondary-tab ">Month</div>
            <div class="secondary-tab ">Year</div>
        </div>

        <div class="table-container">
            <div class="table-header">
                Top Trash by Market Capitalization
            </div>
            <table id="trashTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th><select class="dropdown">
                            <option>Category</option>
                            <option>BB</option>
                        </select></th>
                        <th>Price <div style="font-size: 10px; ">/kg</div></th></th>
                        <th>Week</th>
                        <th>Month</th>
                        <th>Market Cap <div style="font-size: 10px; ">/ Year</div></th>
                        </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="pagination">
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn">...</button>
                <button class="page-btn">15</button>
            </div>
        </div>
    </div>

    <script>
        const trashData = [
            {

            },
            {

            },
            {

                iconImage: '../image/ขวด HDPE.10.png',
            },
            {

                symbol: 'แสตนเลส',

                price: '33 บาท', 
                PYear: '29 บาท', 
                PWeek: '33 บาท', 
                PMonth: '31.8 บาท', 
                iconImage: '../image/สแตนเลส.35.png',
            },
            { 
                name: 'Paper', 
                symbol: 'กระดาษ ขาว-ดำ', 
                Category: 'Paper',
                price: '4.3 บาท', 
                PYear: '3.8 บาท', 
                PWeek: '4.3 บาท', 
                PMonth: '4 บาท', 
                iconImage: '../image/กระดาษ.png',
            },
            { 
                name: '', 
                symbol: 'อลูมิเนียม', 
                Category: 'Metal',
                price: '34 บาท', 
                PYear: '30 บาท', 
                PWeek: '34 บาท', 
                PMonth: '30 บาท', 
                iconImage: '../image/กระป๋ิองอลูมิเนียม.38.png',
            },
            { 
                name: '', 
                symbol: 'กล่องลัง', 
                Category: 'Paper',
                price: '3 บาท', 
                PYear: '2.5 บาท', 
                PWeek: '3 บาท', 
                PMonth: '2.8 บาท', 
                iconImage: '../image/กล่องกระดาษ3.320.png',
            },
            { 
                name: 'PVC', 
                symbol: 'ท่อฟ้า', 
                Category: 'Plastic',
                price: '2.8 บาท', 
                PYear: '2.3 บาท', 
                PWeek: '2.8 บาท', 
                PMonth: '2.5 บาท', 
                iconImage: '../image/ท่อ PVC.3.png',
            },
            { 
                name: '', 
                symbol: 'ขวดแก้ว', 
                Category: 'Glass',
                price: '1 บาท', 
                PYear: '1 บาท', 
                PWeek: '1 บาท', 
                PMonth: '1 บาท', 
                iconImage: '../image/ขวดแก้ว.1.png',
            },
            
                       
        ];
        
        const tbody = document.querySelector('#trashTable tbody');
        
        trashData.forEach(trash => {
            const row = document.createElement('tr');
            const changeClass = trash.change >= 0 ? 'positive' : 'negative';
            const changeSymbol = trash.change >= 0 ? '+' : '';
            
            let iconHTML;
            if (trash.iconImage) {
                iconHTML = `<img src="${trash.iconImage}" ...>`;
            } else {
                iconHTML = trash.icon;
            }

            row.innerHTML = `
                <td>
                    <div class="trash-cell">
                        <div class="trash-icon" style="background: ${trash.color};">
                            ${iconHTML}  
                        </div>
                        <div>
                            <div class="trash-name">${trash.symbol}</div>
                            <div class="trash-symbol">${trash.name}</div>
                        </div>
                    </div>
                </td>
                <td>${trash.Category}</td>
                <td class="price-value">${trash.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td>${trash.PWeek}</td>
                <td>${trash.PMonth}</td>
                <td>${trash.PYear}</td>

            `;
            tbody.appendChild(row);
        });

        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
