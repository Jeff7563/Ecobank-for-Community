    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            border-radius: 4px;
            position: relative;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #b2ff59;
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .nav a:hover::after {
            transform: scaleX(1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 8px;
            cursor: pointer;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59 0%, #0ecb81 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .user-name {
            font-size: 14px;
            color: #eaecef;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .page-title-section {
            flex: 1;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #eaecef;
        }

        .page-subtitle {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 0;
        }

        .btn-back {
            padding: 8px 16px;
            background: #2b3139;
            color: #eaecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #474d57;
        }

        .filter-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            color: #848e9c;
            font-weight: 600;
        }

        .filter-input {
            padding: 8px 12px;
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 6px;
            color: #eaecef;
            font-size: 13px;
            min-width: 150px;
        }

        .filter-input:focus {
            outline: none;
            border-color: #b2ff59;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .event-card {
            background: #1e2329;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #2b3139;
            cursor: pointer;
        }

        .event-card:hover {
            border-color: #b2ff59;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(178, 255, 89, 0.1);
        }

        .event-header {
            background: linear-gradient(135deg, #b2ff59 0%, #0ecb81 100%);
            padding: 20px;
            color: #000;
        }

        .event-date {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .event-day {
            font-size: 24px;
            font-weight: 700;
        }

        .event-body {
            padding: 20px;
        }

        .event-title {
            font-size: 16px;
            font-weight: 600;
            color: #eaecef;
            margin-bottom: 12px;
        }

        .event-location {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #848e9c;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .event-location-icon {
            font-size: 16px;
        }

        .event-time {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #848e9c;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .event-time-icon {
            font-size: 16px;
        }

        .waste-types {
            margin-bottom: 15px;
        }

        .waste-types-label {
            font-size: 12px;
            color: #848e9c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .waste-tags {

            flex-wrap: wrap;
            gap: 8px;
        }

            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }

            background: rgba(14, 203, 129, 0.1);
            color: #0ecb81;
        }

        .waste-tag.plastic {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .waste-tag.glass {
            background: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
        }

        .event-description {
            font-size: 13px;
            color: #848e9c;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .event-footer {

            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #2b3139;
        }

        .event-price {
            font-size: 14px;
            font-weight: 600;
            color: #b2ff59;
        }

        .event-btn {

            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;

            font-weight: 600;

            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #eaecef;

            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #848e9c;

            .stat-number {
                font-size: 20px;

            .stat-label {
                font-size: 10px;

                height: 250px;
                font-size: 12px;

                gap: 8px;
                margin-bottom: 10px;
            }

            .booth-tab {

            table {

            }

            th {

                font-size: 11px;

                location: 'ถ. เพลินจิต, ลุมพินี, ปทุมวัน',
                time: '07:00 - 17:00',
                wasteTypes: ['กระดาษ', 'บรรจุภัณฑ์', 'ไม้'],
                description: 'โกดังรับซื้อกระดาษขนาดใหญ่ ให้ราคาส่วนลดบัญชีรายเดือน',
                price: 'ปรึกษาก่อน',
                special: false
            },
            {
                date: '2024-12-04',
                day: '04 ธ.ค.',
                title: 'Lumpini Glass Collection 🎆',
                location: 'สวนลุมพินี, พระราม 4, บางรัก',
                time: '10:00 - 19:00',
                wasteTypes: ['แก้ว'],
                description: 'กิจกรรมพิเศษ: แก้วนำกลับได้ x3 เท่า + ชา ฟรี',
                price: 'ราคา x3 เท่า!',
                special: true
            }
        ];

        // Render events
        function renderEvents(filteredEvents = events) {
            const grid = document.getElementById('eventsGrid');
            grid.innerHTML = '';

            if (filteredEvents.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #848e9c;">ไม่พบข้อมูล Booth สำหรับวันที่เลือก</div>';
                return;
            }

            filteredEvents.forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-card';
                
                const specialBadge = event.special ? '<div class="special-badge">🔥 ราคาพิเศษ</div>' : '';
                
                card.innerHTML = `
                    <div class="event-header">
                        <div class="event-date">${event.date}</div>
                        <div class="event-day">${event.day}</div>
                    </div>
                    <div class="event-body">
                        ${specialBadge}
                        <div class="event-title">${event.title}</div>
                        
                        <div class="event-location">
                            <span class="event-location-icon">📍</span>
                            <span>${event.location}</span>
                        </div>
                        
                        <div class="event-time">
                            <span class="event-time-icon">🕒</span>
                            <span>${event.time}</span>
                        </div>
                        
                        <div class="waste-types">
                            <div class="waste-types-label">ประเภทขยะ:</div>
                            <div class="waste-tags">
                                ${event.wasteTypes.map(type => {
                                    let className = '';
                                    if (type.includes('โลหะ') || type.includes('แดง') || type.includes('สแตนเลส') || type.includes('อลูมิเนียม')) {
                                        className = 'metal';
                                    } else if (type.includes('พลาสติก') || type.includes('ขวด')) {
                                        className = 'plastic';
                                    } else if (type.includes('แก้ว')) {
                                        className = 'glass';
                                    }
                                    return `<div class="waste-tag ${className}">${type}</div>`;
                                }).join('')}
                            </div>
                        </div>
                        
                        <div class="event-description">${event.description}</div>
                        
                        <div class="event-footer">
                            <div class="event-price">${event.price}</div>
                            <button class="event-btn">ไปตรวจสอบ</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter events
        function filterEvents() {
            const dateFilter = document.getElementById('dateFilter').value;
            const locationFilter = document.getElementById('locationFilter').value.toLowerCase();

            return events.filter(event => {
                const matchDate = !dateFilter || event.date === dateFilter;
                const matchLocation = !locationFilter || event.location.toLowerCase().includes(locationFilter);
                return matchDate && matchLocation;
            });
        }

        // Event listeners
        document.getElementById('dateFilter').addEventListener('change', () => {
            renderEvents(filterEvents());
        });

        document.getElementById('locationFilter').addEventListener('input', () => {
            renderEvents(filterEvents());
        });

        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateFilter').value = today;

        // Initial render
        renderEvents(filterEvents());
    </script>
</body>
</html>
