<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booths - ECOBANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(178, 255, 89, 0.5);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #eaecef;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59, #0ecb81);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .logout-btn {
            background: #f6465d;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e03545;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            animation: slideUp 0.5s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .page-subtitle {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out 0.3s both;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            animation: slideUp 0.5s ease-out 0.4s both;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid #2b3139;
            color: #eaecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: #b2ff59;
            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
        }

        .booths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            animation: slideUp 0.5s ease-out 0.5s both;
        }

        .booth-card {
            background: #1e2329;
            border: 1px solid #2b3139;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .booth-card:hover {
            border-color: #b2ff59;
            box-shadow: 0 8px 24px rgba(178, 255, 89, 0.1);
            transform: translateY(-4px);
        }

        .booth-header {
            background: linear-gradient(135deg, rgba(178, 255, 89, 0.1), rgba(14, 203, 129, 0.1));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .booth-icon {
            font-size: 40px;
        }

        .booth-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(14, 203, 129, 0.2);
            color: #0ecb81;
            font-weight: 600;
        }

        .booth-status.closed {
            background: rgba(246, 70, 93, 0.2);
            color: #f6465d;
        }

        .booth-body {
            padding: 20px;
        }

        .booth-name {
            font-size: 18px;
            font-weight: 700;
            color: #eaecef;
            margin-bottom: 8px;
        }

        .booth-district {
            font-size: 12px;
            color: #848e9c;
            margin-bottom: 15px;
        }

        .booth-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .info-icon {
            font-size: 16px;
            min-width: 16px;
        }

        .info-label {
            color: #848e9c;
        }

        .info-value {
            color: #b2ff59;
            font-weight: 600;
        }

        .booth-footer {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .booth-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #2b3139;
            background: transparent;
            color: #b2ff59;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .booth-btn:hover {
            background: #b2ff59;
            color: #000;
            border-color: #b2ff59;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #b2ff59;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2b3139;
            border-top-color: #b2ff59;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #848e9c;
        }

        @media (max-width: 768px) {
            .booths-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .header-left {
                gap: 15px;
            }

            .nav {
                gap: 12px;
            }

            .nav a {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">🌿 ECOBANK</div>
            <div class="nav">
                <a href="index.html">Home</a>
                <a href="trash_types.html">Type</a>
                <a href="exchange.html">Exchange</a>
                <a href="wallet.html">Wallet</a>
                <a href="booths.html" style="color: #b2ff59;">Booths</a>
            </div>
        </div>
        <div class="header-right" id="headerRight"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-title">🏪 Booth Locations</div>
        <div class="page-subtitle">ค้นหาสาขา ECOBANK ที่ใกล้เคียงคุณ</div>

        <!-- Filter Tabs -->
        <div class="filter-tabs" id="filterTabs"></div>

        <!-- Booths Grid -->
        <div class="booths-grid" id="boothsGrid">
            <div class="loading">
                <span class="spinner"></span>
                <span>กำลังโหลดข้อมูล...</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            getEvents
        } from "../js/firebase-service.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;
        let allEvents = [];
        let selectedDistrict = 'all';
        const auth = getAuth();

        onAuthStateChanged(auth, async (user) => {
            // For booths page, we don't require login to view
            if (user) {
                currentUser = user;
                const userData = JSON.parse(localStorage.getItem('ecobank_user'));
                setupHeader(userData);
            } else {
                setupGuestHeader();
            }

            await loadBooths();
        });

        function setupHeader(userData) {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(userData?.name || 'U')[0].toUpperCase()}</div>
                    <span>${userData?.name || 'User'}</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('ecobank_user');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        }

        function setupGuestHeader() {
            // Guest view - no user profile needed
        }

        async function loadBooths() {
            try {
                allEvents = await getEvents();
                setupFilters();
                renderBooths();
            } catch (error) {
                console.error('Error loading booths:', error);
                document.getElementById('boothsGrid').innerHTML = `
                    <div class="empty-state">
                        เกิดข้อผิดพลาด: ${error.message}
                    </div>
                `;
            }
        }

        function setupFilters() {
            const districts = ['all', ...new Set(allEvents.map(e => e.district))];
            const filterTabs = document.getElementById('filterTabs');
            
            filterTabs.innerHTML = districts.map(district => {
                const label = district === 'all' ? 'ทั้งหมด' : district;
                return `
                    <button class="filter-btn ${district === 'all' ? 'active' : ''}" 
                            onclick="filterByDistrict('${district}')">${label}</button>
                `;
            }).join('');
        }

        window.filterByDistrict = function(district) {
            selectedDistrict = district;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBooths();
        };

        function renderBooths() {
            const grid = document.getElementById('boothsGrid');
            let filtered = allEvents;

            if (selectedDistrict !== 'all') {
                filtered = allEvents.filter(e => e.district === selectedDistrict);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">ไม่มีสาขาในพื้นที่นี้</div>';
                return;
            }

            grid.innerHTML = filtered.map(booth => {
                const isOpen = booth.status === 'open' || booth.status === 'opening';
                const status = isOpen ? '🟢 เปิด' : '🔴 ปิด';
                const statusClass = isOpen ? '' : 'closed';

                return `
                    <div class="booth-card">
                        <div class="booth-header">
                            <div class="booth-icon">${booth.icon || '🏪'}</div>
                            <div class="booth-status ${statusClass}">${status}</div>
                        </div>
                        <div class="booth-body">
                            <div class="booth-name">${booth.name}</div>
                            <div class="booth-district">📍 ${booth.district}</div>
                            <div class="booth-info">
                                <div class="info-row">
                                    <span class="info-icon">🏠</span>
                                    <span class="info-label">ที่อยู่:</span>
                                </div>
                                <div style="font-size: 12px; color: #eaecef; margin-left: 26px; line-height: 1.4;">
                                    ${booth.address || 'ไม่ระบุ'}
                                </div>
                            </div>
                            <div class="booth-info">
                                <div class="info-row">
                                    <span class="info-icon">⏰</span>
                                    <span class="info-label">เวลาทำการ:</span>
                                    <span class="info-value">${booth.hours || 'ไม่ระบุ'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-icon">📞</span>
                                    <span class="info-label">โทรศัพท์:</span>
                                    <span class="info-value">${booth.phone || 'ไม่ระบุ'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="booth-footer">
                            <button class="booth-btn" onclick="viewDetails('${booth.id}')">รายละเอียด</button>
                            <button class="booth-btn" onclick="directToGoogleMaps('${booth.lat}','${booth.lng}')">แผนที่</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.viewDetails = function(boothId) {
            const booth = allEvents.find(e => e.id === boothId);
            if (booth) {
                alert(`สาขา: ${booth.name}\nที่อยู่: ${booth.address}\nเวลา: ${booth.hours}\nโทร: ${booth.phone}`);
            }
        };

        window.directToGoogleMaps = function(lat, lng) {
            if (lat && lng) {
                window.open(`https://www.google.com/maps/search/${lat},${lng}`, '_blank');
            } else {
                alert('ไม่มีข้อมูลตำแหน่ง');
            }
        };

        window.filterByDistrict = filterByDistrict;
    </script>
</body>
</html>
