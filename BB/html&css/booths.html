<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booths - ECOBANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 4px;
            position: relative;
        }

        .nav a h3 {
            margin: 0;
            display: flex;
            align-items: center;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #b2ff59;
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .nav a:hover::after {
            transform: scaleX(1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #loginButtons {
            display: flex;
            gap: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 15px;
        }

        .user-profile:hover {
            background: #3a4149;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59, #7ac943);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 12px;
        }

        .user-name {
            font-size: 13px;
            color: #eaecef;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #2b3139;
            color: #f6465d;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f6465d;
            color: #fff;
            border-color: #f6465d;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .page-title-section {
            flex: 1;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #eaecef;
        }

        .page-subtitle {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 0;
        }

        .filter-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            color: #848e9c;
            font-weight: 600;
        }

        .filter-input {
            padding: 8px 12px;
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 6px;
            color: #eaecef;
            font-size: 13px;
            min-width: 150px;
        }

        .filter-input:focus {
            outline: none;
            border-color: #b2ff59;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e2329;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border-left: 3px solid #b2ff59;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #b2ff59;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #848e9c;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .event-card {
            background: #1e2329;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #2b3139;
            cursor: pointer;
        }

        .event-card:hover {
            border-color: #b2ff59;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(178, 255, 89, 0.1);
        }

        .event-header {
            background: linear-gradient(135deg, #b2ff59 0%, #0ecb81 100%);
            padding: 20px;
            color: #000;
        }

        .event-date {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .event-day {
            font-size: 24px;
            font-weight: 700;
        }

        .event-body {
            padding: 20px;
        }

        .event-title {
            font-size: 16px;
            font-weight: 600;
            color: #eaecef;
            margin-bottom: 12px;
        }

        .event-location {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #848e9c;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .event-location-icon {
            font-size: 16px;
        }

        .event-time {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #848e9c;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .event-time-icon {
            font-size: 16px;
        }

        .waste-types {
            margin-bottom: 15px;
        }

        .waste-types-label {
            font-size: 12px;
            color: #848e9c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .waste-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .waste-tag {
            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }

        .waste-tag.metal {
            background: rgba(14, 203, 129, 0.1);
            color: #0ecb81;
        }

        .waste-tag.plastic {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .waste-tag.glass {
            background: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
        }

        .event-description {
            font-size: 13px;
            color: #848e9c;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #2b3139;
        }

        .event-price {
            font-size: 14px;
            font-weight: 600;
            color: #b2ff59;
        }

        .event-btn {
            padding: 6px 12px;
            background: #b2ff59;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .event-btn:hover {
            background: #c0ee8c;
        }

        .special-badge {
            display: inline-block;
            background: #f6465d;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .map-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #eaecef;
        }

        .map-container {
            width: 100%;
            height: 400px;
            background: #0b0e11;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #848e9c;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #b2ff59;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2b3139;
            border-top-color: #b2ff59;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #848e9c;
        }

        @media (max-width: 768px) {
            .events-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .page-subtitle {
                font-size: 13px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-card {
                padding: 12px;
            }

            .stat-number {
                font-size: 24px;
            }

            .stat-label {
                font-size: 11px;
            }

            .map-container {
                height: 300px;
                font-size: 13px;
            }

            .filter-section {
                flex-direction: column;
            }

            .filter-input {
                width: 100%;
                min-width: unset;
            }
        }

        @media (max-width: 480px) {
            .events-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 10px;
            }

            .page-title {
                font-size: 20px;
            }

            .page-subtitle {
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 10px;
            }

            .stat-number {
                font-size: 20px;
            }

            .stat-label {
                font-size: 10px;
            }

            .map-container {
                height: 250px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">🌿 ECOBANK</div>
            <div class="nav">
                <a href="index.html"><h3>Home</h3></a>
                <a href="trash_types.html"><h3>Type</h3></a>
                <a href="exchange.html"><h3>Exchange</h3></a>
                <a href="wallet.html"><h3>Wallet</h3></a>
                <a href="booths.html"><h3>Booths</h3></a>
            </div>
        </div>
        <div class="header-right" id="headerRight"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <div class="page-title-section">
                <div class="page-title">🎪 Events & Booths</div>
                <div class="page-subtitle">ตารางการรับซื้อขยะประจำวัน และกิจกรรมพิเศษ</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">12</div>
                <div class="stat-label">Booths วันนี้</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">28</div>
                <div class="stat-label">Booths สัปดาห์นี้</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">8</div>
                <div class="stat-label">ประเภทขยะทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">5</div>
                <div class="stat-label">กิจกรรมพิเศษ</div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label class="filter-label">ค้นหาวันที่</label>
                <input type="date" class="filter-input" id="dateFilter">
            </div>
            <div class="filter-group">
                <label class="filter-label">ค้นหาทำเลที่ตั้ง</label>
                <input type="text" class="filter-input" id="locationFilter" placeholder="เช่น สาทร, ชิดลม">
            </div>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="boothsGrid">
            <div class="loading">
                <span class="spinner"></span>
                <span>กำลังโหลดข้อมูล...</span>
            </div>
        </div>

        <div class="map-section">
            <h2 class="section-title">📍 แผนที่สถานที่รับซื้อ</h2>
            <div class="map-container">
                🗺️ Google Maps Integration (ระบุตำแหน่ง Booth ทั้งหมด)
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            getEvents
        } from "../js/firebase-service.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;
        let allEvents = [];
        const auth = getAuth();

        onAuthStateChanged(auth, async (user) => {
            // For booths page, we don't require login to view
            if (user) {
                currentUser = user;
                const userData = JSON.parse(localStorage.getItem('ecobank_user'));
                setupHeader(userData);
            } else {
                setupGuestHeader();
            }

            await loadBooths();
            setDefaultDate();
        });

        function setupHeader(userData) {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(userData?.name || 'U')[0].toUpperCase()}</div>
                    <span>${userData?.name || 'User'}</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('ecobank_user');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        }

        function setupGuestHeader() {
            // Guest view - no user profile needed
        }

        async function loadBooths() {
            try {
                allEvents = await getEvents();
                renderEvents();
            } catch (error) {
                console.error('Error loading booths:', error);
                document.getElementById('boothsGrid').innerHTML = `
                    <div class="empty-state">
                        เกิดข้อผิดพลาด: ${error.message}
                    </div>
                `;
            }
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFilter').value = today;
        }

        function filterEvents() {
            const dateFilter = document.getElementById('dateFilter').value;
            const locationFilter = document.getElementById('locationFilter').value.toLowerCase();

            return allEvents.filter(event => {
                const matchDate = !dateFilter || event.date === dateFilter;
                const matchLocation = !locationFilter || event.location?.toLowerCase().includes(locationFilter);
                return matchDate && matchLocation;
            });
        }

        function renderEvents(filteredEvents = allEvents) {
            const grid = document.getElementById('boothsGrid');
            grid.innerHTML = '';

            if (filteredEvents.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #848e9c;">ไม่พบข้อมูล Booth สำหรับวันที่เลือก</div>';
                return;
            }

            filteredEvents.forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-card';
                
                const specialBadge = event.special ? '<div class="special-badge">🔥 ราคาพิเศษ</div>' : '';
                const eventDate = event.date || new Date().toISOString().split('T')[0];
                const eventDay = event.day || new Date(eventDate).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit' });
                
                card.innerHTML = `
                    <div class="event-header">
                        <div class="event-date">${eventDate}</div>
                        <div class="event-day">${eventDay}</div>
                    </div>
                    <div class="event-body">
                        ${specialBadge}
                        <div class="event-title">${event.name || 'Booth'}</div>
                        
                        <div class="event-location">
                            <span class="event-location-icon">📍</span>
                            <span>${event.district || 'ไม่ระบุ'}</span>
                        </div>
                        
                        <div class="event-time">
                            <span class="event-time-icon">🕒</span>
                            <span>${event.hours || 'ไม่ระบุ'}</span>
                        </div>
                        
                        <div class="waste-types">
                            <div class="waste-types-label">ประเภทขยะ:</div>
                            <div class="waste-tags">
                                <div class="waste-tag metal">โลหะ</div>
                            </div>
                        </div>
                        
                        <div class="event-description">${event.address || 'ไม่ระบุ'}</div>
                        
                        <div class="event-footer">
                            <div class="event-price">${event.phone || 'ติดต่อ'}</div>
                            <button class="event-btn">ไปตรวจสอบ</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Event listeners for filters
        document.getElementById('dateFilter').addEventListener('change', () => {
            renderEvents(filterEvents());
        });

        document.getElementById('locationFilter').addEventListener('input', () => {
            renderEvents(filterEvents());
        });
    </script>
</body>
</html>
