    <style>

            margin: 0;
            padding: 0;

        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        .logo {

        }

        .logo-text {

        }

        h1 {

            font-size: 28px;

        }

        .form-group {

        }

        label {

        }

        .password-input {

        .password-input input {

        .toggle-password {

            transform: translateY(-50%);

            border: none;

        }

        .terms-checkbox {

        }

        .terms-checkbox label {
            color: #848e9c;
            font-size: 13px;

            margin: 0;
            cursor: pointer;
        }

        .terms-checkbox label a {
            color: #eaecef;

        }

        .terms-checkbox label a:hover {

        .create-account {

        .create-account a:hover {

        .footer {

            justify-content: center;

        }

        .footer a {

            transition: color 0.3s;
        }

        .footer a:hover {

        }

        .language-selector {

        }

        .language-btn {

            color: #eaecef;

        .language-option:hover {

        }

        .language-option.selected {

        .password-strength {
            height: 4px;
            background: #2b3139;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;

            transition: all 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #f6465d;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #f0b90b;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #0ecb81;
        }

        .password-match {
            font-size: 12px;

        }

        @media (max-width: 480px) {

            }

            }

            }

            }

            }

        }
    </style>

    <style>
        /* Modal Styles */
        .modal {

            z-index: 1000;
            left: 0;

            background-color: rgba(0, 0, 0, 0.6);

        @keyframes fadeIn {

        .modal.show {

        .modal-content {

        .modal-icon {

        .modal-title {

            font-weight: 600;

        .modal-buttons {

</head>
<body>
    <div class="container">
        <div class="back-home">

            <div class="terms-checkbox">

                    การสร้างบัญชี ถือว่าฉันยอมรับ <a href="#">ข้อกำหนดการให้บริการ</a> และ <a href="#">ประกาศความเป็นส่วนตัว</a> ของ EC

                </button>
                <div class="language-dropdown" id="languageDropdown">

    <!-- Modal Popup -->
    <div class="modal" id="notificationModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">ℹ️</div>
            <div class="modal-title" id="modalTitle">แจ้งเตือน</div>
            <div class="modal-message" id="modalMessage">-</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-close" onclick="closeModal()">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPasswordInput');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'text' ? '🙈' : '👁️';
        });

        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            toggleConfirmPassword.textContent = type === 'text' ? '🙈' : '👁️';
        });

        // Password strength checker
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strengthBar = document.getElementById('strengthBar');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            if (strength >= 3) {
                strengthBar.classList.add('strong');
            } else if (strength >= 2) {
                strengthBar.classList.add('medium');
            } else if (strength >= 1) {
                strengthBar.classList.add('weak');
            }
            
            checkPasswordMatch();
        });

        // Password match checker
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirmPassword === '') {
                matchDiv.textContent = '';
                matchDiv.className = 'password-match';
            } else if (password === confirmPassword) {
                matchDiv.textContent = '✓ รหัสผ่านตรงกัน';
                matchDiv.className = 'password-match success';
            } else {
                matchDiv.textContent = '✗ รหัสผ่านไม่ตรงกัน';
                matchDiv.className = 'password-match error';
            }
            
            checkFormValidity();
        }

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        // Check form validity
        function checkFormValidity() {
            const email = document.getElementById('emailInput').value;
            const phone = document.getElementById('phoneInput').value;
            const location = document.getElementById('locationInput').value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const terms = document.getElementById('terms').checked;
            const continueBtn = document.getElementById('continueBtn');
            
            const isValid = email && phone && location && password && confirmPassword && 
                        password === confirmPassword && password.length >= 6 && terms;
            
            continueBtn.disabled = !isValid;
        }

        document.getElementById('emailInput').addEventListener('input', checkFormValidity);
        document.getElementById('phoneInput').addEventListener('input', checkFormValidity);
        document.getElementById('locationInput').addEventListener('input', checkFormValidity);
        passwordInput.addEventListener('input', checkFormValidity);
        confirmPasswordInput.addEventListener('input', checkFormValidity);
        document.getElementById('terms').addEventListener('change', checkFormValidity);

        // Language selector
        const languageBtn = document.getElementById('languageBtn');
        const languageDropdown = document.getElementById('languageDropdown');
        const currentLanguage = document.getElementById('currentLanguage');
        const languageOptions = document.querySelectorAll('.language-option');

        languageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            languageDropdown.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            languageDropdown.classList.remove('active');
        });

        languageOptions.forEach(option => {
            option.addEventListener('click', () => {
                const lang = option.dataset.lang;
                const langText = option.textContent;

                currentLanguage.textContent = langText.split(' ')[1];
                languageOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                languageDropdown.classList.remove('active');
                
                changeLanguage(lang);
            });
        });

        function changeLanguage(lang) {
            const translations = {
                th: {
                    title: 'ยินดีต้อนรับสู่ EC',
                    emailLabel: 'อีเมล',
                    emailPlaceholder: 'อีเมล',
                    phoneLabel: 'หมายเลขโทรศัพท์',
                    phonePlaceholder: 'หมายเลขโทรศัพท์',
                    locationLabel: 'ที่อยู่',
                    locationPlaceholder: 'เช่น กรุงเทพ, ชั้น 5 อาคาร ABC',
                    passwordLabel: 'รหัสผ่าน',
                    passwordPlaceholder: 'รหัสผ่าน',
                    confirmPasswordLabel: 'ยืนยันรหัสผ่าน',
                    confirmPasswordPlaceholder: 'ยืนยันรหัสผ่าน',
                    continueBtn: 'ดำเนินการต่อ',
                    terms: 'การสร้างบัญชี ถือว่าฉันยอมรับ',
                    termsLink: 'ข้อกำหนดการให้บริการ',
                    privacyLink: 'ประกาศความเป็นส่วนตัว',
                    loginLink: 'เข้าสู่ระบบ',
                },
                en: {
                    title: 'Welcome to EC',
                    emailLabel: 'Email',
                    emailPlaceholder: 'Email',
                    phoneLabel: 'Phone Number',
                    phonePlaceholder: 'Phone Number',
                    locationLabel: 'Location',
                    locationPlaceholder: 'e.g., Bangkok, Floor 5 Building ABC',
                    passwordLabel: 'Password',
                    passwordPlaceholder: 'Password',
                    confirmPasswordLabel: 'Confirm Password',
                    confirmPasswordPlaceholder: 'Confirm Password',
                    continueBtn: 'Continue',
                    terms: 'By creating an account, I agree to EC',
                    termsLink: 'Terms of Service',
                    privacyLink: 'Privacy Notice',
                    loginLink: 'Login',
                }
            };

            const t = translations[lang] || translations.th;

            document.getElementById('pageTitle').textContent = t.title;
            document.getElementById('emailLabel').textContent = t.emailLabel;
            document.getElementById('phoneLabel').textContent = t.phoneLabel;
            document.getElementById('locationLabel').textContent = t.locationLabel;
            document.getElementById('passwordLabel').textContent = t.passwordLabel;
            document.getElementById('confirmPasswordLabel').textContent = t.confirmPasswordLabel;
            document.getElementById('emailInput').placeholder = t.emailPlaceholder;
            document.getElementById('phoneInput').placeholder = t.phonePlaceholder;
            document.getElementById('locationInput').placeholder = t.locationPlaceholder;
            document.getElementById('passwordInput').placeholder = t.passwordPlaceholder;
            document.getElementById('confirmPasswordInput').placeholder = t.confirmPasswordPlaceholder;
            document.getElementById('continueBtn').textContent = t.continueBtn;
            document.getElementById('loginLink').textContent = t.loginLink;
            
            const termsLabel = document.getElementById('termsLabel');
            termsLabel.innerHTML = `${t.terms} <a href="#">${t.termsLink}</a> และ <a href="#">${t.privacyLink}</a> ของ EC`;
        }

        // Modal functions
        function showModal(icon, title, message) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('notificationModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('notificationModal').classList.remove('show');
        }

        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('notificationModal');
            if (e.target === modal) {
                closeModal();
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const phone = document.getElementById('phoneInput').value;
            const location = document.getElementById('locationInput').value;
            
            try {
                // สร้าง User ใน Firebase Authentication
                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;
                
                // บันทึกข้อมูลเพิ่มเติมใน Firestore
                try {
                    await window.addDoc(window.collection(window.db, 'users'), {
                        userId: user.uid,
                        email: email,
                        username: email.split('@')[0],
                        phone: phone,
                        location: location,
                        avatar: email.charAt(0).toUpperCase(),
                        createdAt: new Date(),
                        balance: {
                            thb: 0,
                            wasteAssets: 0
                        },
                        stats: {
                            totalProfit: 0,
                            totalTransactions: 0
                        }
                    });
                } catch (firestoreError) {
                    // ถ้า Firestore write ล้มเหลว แต่ authentication สำเร็จ
                    console.warn('Firestore write failed but auth succeeded:', firestoreError);
                    // ยังคงให้ user ลงทะเบียนสำเร็จ เพราะ auth สำเร็จแล้ว
                }
                
                showModal('✅', 'สมัครสมาชิกสำเร็จ', 'บัญชีของคุณถูกสร้างสำเร็จแล้ว');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                
            } catch (error) {
                console.error('Error:', error);
                
                // แสดง error message ที่เป็นประโยชน์
                let errorMessage = error.message;
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'อีเมลนี้ได้ลงทะเบียนแล้ว';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'รหัสผ่านอ่อนเกินไป (ต้องอย่างน้อย 6 ตัวอักษร)';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'รูปแบบอีเมลไม่ถูกต้อง';
                }
                
                showModal('❌', 'เกิดข้อผิดพลาด', errorMessage);
            }
        });

        // Set Thai as default
        changeLanguage('th');
    </script>
</body>
</html>
