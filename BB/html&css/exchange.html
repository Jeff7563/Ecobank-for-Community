<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange - ECOBANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e11;
            color: #eaecef;
        }

        .header {
            background: #181a20;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: #b2ff59;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 4px;
            position: relative;
        }

        .nav a h3 {
            margin: 0;
            display: flex;
            align-items: center;
        }

        .nav a:hover {
            color: #b2ff59;
            background-color: rgba(178, 255, 89, 0.1);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #b2ff59;
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .nav a:hover::after {
            transform: scaleX(1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #2b3139;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b2ff59, #7ac943);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(178, 255, 89, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(178, 255, 89, 0); }
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #2b3139;
            color: #f6465d;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f6465d;
            color: #fff;
            border-color: #f6465d;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            animation: slideUp 0.5s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .page-subtitle {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out 0.3s both;
        }

        .exchange-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            animation: slideUp 0.5s ease-out 0.4s both;
        }

        .trash-items-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2b3139;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #eaecef;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid #2b3139;
            color: #eaecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: #b2ff59;
            background: rgba(178, 255, 89, 0.1);
            color: #b2ff59;
        }

        .trash-item-card {
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .trash-item-card:hover {
            border-color: #b2ff59;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(178, 255, 89, 0.2);
        }

        .trash-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .trash-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .trash-icon {
            font-size: 28px;
        }

        .trash-details {
            flex: 1;
        }

        .trash-name {
            font-weight: 600;
            color: #eaecef;
            font-size: 14px;
        }

        .trash-category {
            font-size: 12px;
            color: #848e9c;
            margin-top: 2px;
        }

        .trash-price {
            font-weight: 600;
            color: #b2ff59;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-label {
            font-size: 12px;
            color: #848e9c;
            white-space: nowrap;
        }

        .input-field {
            flex: 1;
            padding: 8px;
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 4px;
            color: #eaecef;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #b2ff59;
            box-shadow: 0 0 8px rgba(178, 255, 89, 0.2);
        }

        .cart-section {
            background: #1e2329;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2b3139;
            height: fit-content;
            position: sticky;
            top: 100px;
            animation: slideUp 0.5s ease-out 0.5s both;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2b3139;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 600;
            color: #eaecef;
        }

        .cart-item-detail {
            font-size: 12px;
            color: #848e9c;
            margin-top: 3px;
        }

        .cart-item-price {
            font-size: 13px;
            font-weight: 600;
            color: #b2ff59;
            margin: 0 12px;
        }

        .remove-btn {
            background: transparent;
            color: #f6465d;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            padding: 2px 6px;
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        .cart-summary {
            background: #0b0e11;
            border: 1px solid #2b3139;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .summary-row:last-child {
            margin-bottom: 0;
            border-top: 1px solid #2b3139;
            padding-top: 10px;
            font-weight: 600;
            font-size: 15px;
            color: #b2ff59;
        }

        .summary-label {
            color: #848e9c;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #b2ff59;
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            background: #c0ee8c;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(178, 255, 89, 0.3);
        }

        .btn-primary:disabled {
            background: #474d57;
            color: #848e9c;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-secondary {
            background: transparent;
            color: #eaecef;
            border: 1px solid #2b3139;
        }

        .btn-secondary:hover {
            background: #2b3139;
            border-color: #b2ff59;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #b2ff59;
            font-size: 13px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2b3139;
            border-top-color: #b2ff59;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(14, 203, 129, 0.1);
            border: 1px solid #0ecb81;
            color: #0ecb81;
        }

        .alert-error {
            background: rgba(246, 70, 93, 0.1);
            border: 1px solid #f6465d;
            color: #f6465d;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #848e9c;
        }

        @media (max-width: 768px) {
            .exchange-layout {
                grid-template-columns: 1fr;
            }

            .cart-section {
                position: static;
            }

            .container {
                padding: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .header-left {
                gap: 15px;
            }

            .nav {
                gap: 12px;
            }

            .nav a {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">🌿 ECOBANK</div>
            <div class="nav">
                <a href="index.html"><h3>Home</h3></a>
                <a href="trash_types.html"><h3>Type</h3></a>
                <a href="exchange.html"><h3>Exchange</h3></a>
                <a href="wallet.html"><h3>Wallet</h3></a>
                <a href="booths.html"><h3>Booths</h3></a>
            </div>
        </div>
        <div class="header-right" id="headerRight"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-title">💱 Exchange Waste</div>
        <div class="page-subtitle">ซื้อขยะรีไซเคิลและเพิ่มเงินในกระเป๋าของคุณ</div>

        <div id="successAlert" class="alert alert-success"></div>
        <div id="errorAlert" class="alert alert-error"></div>

        <div class="exchange-layout">
            <!-- Trash Items List -->
            <div class="trash-items-section">
                <div class="section-title">📦 ขยะที่มีจำหน่าย</div>
                
                <div class="category-filter" id="categoryFilter"></div>
                <div id="trashItemsList"></div>
            </div>

            <!-- Shopping Cart -->
            <div class="cart-section">
                <div class="section-title">🛒 ตะกร้าของคุณ</div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-state">ยังไม่มีสินค้าในตะกร้า</div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">รวมน้ำหนัก:</span>
                        <span id="totalWeight">0 kg</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">รวมราคา:</span>
                        <span id="totalPrice">0 ฿</span>
                    </div>
                    <div class="summary-row">
                        <span>รวมทั้งสิ้น: </span>
                        <span id="grandTotal">0 ฿</span>
                    </div>
                </div>

                <button class="btn btn-primary" id="purchaseBtn" onclick="purchaseWaste()">ยืนยันการซื้อ</button>
                <button class="btn btn-secondary" onclick="clearCart()">ล้างตะกร้า</button>

                <div class="loading" id="loadingIndicator">
                    <span class="spinner"></span>
                    <span>กำลังประมวลผล...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            getTrashTypes, 
            addWasteToPortfolio,
            initializeUserWallet,
            seedInitialData
        } from "../js/firebase-service.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;
        let trashTypes = [];
        let cart = [];
        let selectedCategory = 'all';

        const auth = getAuth();

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;
            const userData = JSON.parse(localStorage.getItem('ecobank_user'));
            setupHeader(userData);

            // Initialize wallet
            await initializeUserWallet(user.uid, userData || {});

            // Seed data if first time
            await seedInitialData();

            // Load trash types
            await loadTrashTypes();
        });

        function setupHeader(userData) {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(userData?.name || 'U')[0].toUpperCase()}</div>
                    <span>${userData?.name || 'User'}</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    localStorage.removeItem('ecobank_user');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        }

        async function loadTrashTypes() {
            try {
                trashTypes = await getTrashTypes();
                renderCategories();
                renderTrashItems();
            } catch (error) {
                showError('ไม่สามารถโหลดข้อมูลขยะได้: ' + error.message);
            }
        }

        function renderCategories() {
            const filter = document.getElementById('categoryFilter');
            const categories = ['all', ...new Set(trashTypes.map(t => t.category))];
            
            filter.innerHTML = categories.map(cat => {
                const label = cat === 'all' ? 'ทั้งหมด' : cat;
                return `<button class="filter-btn ${cat === 'all' ? 'active' : ''}" onclick="filterByCategory('${cat}')">${label}</button>`;
            }).join('');
        }

        window.filterByCategory = function(category) {
            selectedCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTrashItems();
        };

        function renderTrashItems() {
            const container = document.getElementById('trashItemsList');
            let filtered = trashTypes;

            if (selectedCategory !== 'all') {
                filtered = trashTypes.filter(t => t.category === selectedCategory);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">ไม่มีข้อมูลขยะ</div>';
                return;
            }

            container.innerHTML = filtered.map(trash => `
                <div class="trash-item-card" data-trash-id="${trash.id}">
                    <div class="trash-item-header">
                        <div class="trash-info">
                            <div class="trash-icon">${trash.icon || '📦'}</div>
                            <div class="trash-details">
                                <div class="trash-name">${trash.name}</div>
                                <div class="trash-category">${trash.category}</div>
                            </div>
                        </div>
                        <div class="trash-price">${trash.price_per_unit || 0} ฿/kg</div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">ปริมาณ:</label>
                        <input type="number" class="input-field qty-input" placeholder="kg" min="0" step="0.1" data-trash-id="${trash.id}">
                    </div>
                </div>
            `).join('');

            // Add event listeners to quantity inputs
            document.querySelectorAll('.qty-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const quantity = parseFloat(e.target.value);
                    const trashId = e.target.getAttribute('data-trash-id');
                    const trash = trashTypes.find(t => t.id === trashId);
                    
                    if (trash && quantity > 0) {
                        addToCart(trash, quantity);
                        e.target.value = '';
                    }
                });
            });
        }

        function addToCart(trash, quantity) {
            const existingItem = cart.find(item => item.trash.id === trash.id);
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ trash, quantity });
            }

            updateCartDisplay();
            showSuccess(`เพิ่ม ${trash.name} ${quantity} kg ลงตะกร้าแล้ว`);
        }

        window.removeFromCart = function(trashId) {
            cart = cart.filter(item => item.trash.id !== trashId);
            updateCartDisplay();
        };

        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-state">ยังไม่มีสินค้าในตะกร้า</div>';
                document.getElementById('totalWeight').textContent = '0 kg';
                document.getElementById('totalPrice').textContent = '0 ฿';
                document.getElementById('grandTotal').textContent = '0 ฿';
                return;
            }

            let totalWeight = 0;
            let totalPrice = 0;

            container.innerHTML = cart.map(item => {
                totalWeight += item.quantity;
                const itemPrice = item.quantity * item.trash.price_per_unit;
                totalPrice += itemPrice;

                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.trash.name}</div>
                            <div class="cart-item-detail">${item.quantity} kg × ${item.trash.price_per_unit} ฿ = ${itemPrice} ฿</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="cart-item-price">${itemPrice} ฿</div>
                            <button class="remove-btn" onclick="removeFromCart('${item.trash.id}')">✕</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('totalWeight').textContent = totalWeight.toFixed(2) + ' kg';
            document.getElementById('totalPrice').textContent = totalPrice.toLocaleString('th-TH') + ' ฿';
            document.getElementById('grandTotal').textContent = totalPrice.toLocaleString('th-TH') + ' ฿';
        }

        window.clearCart = function() {
            cart = [];
            updateCartDisplay();
        };

        window.purchaseWaste = async function() {
            if (cart.length === 0) {
                showError('กรุณาเลือกขยะในตะกร้า');
                return;
            }

            document.getElementById('loadingIndicator').classList.add('show');
            document.getElementById('purchaseBtn').disabled = true;

            try {
                for (const item of cart) {
                    await addWasteToPortfolio(
                        currentUser.uid,
                        item.trash,
                        item.quantity,
                        item.trash.price_per_unit
                    );
                }

                showSuccess('ซื้อขยะสำเร็จ! เงินได้เพิ่มเข้ากระเป๋าแล้ว ✨');
                clearCart();
                
                // Redirect to wallet after 2 seconds
                setTimeout(() => {
                    window.location.href = 'wallet.html';
                }, 2000);
            } catch (error) {
                showError('เกิดข้อผิดพลาด: ' + error.message);
            } finally {
                document.getElementById('loadingIndicator').classList.remove('show');
                document.getElementById('purchaseBtn').disabled = false;
            }
        };

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = '✓ ' + message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = '✗ ' + message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        // Expose functions to global scope
        window.addToCart = addToCart;
        window.updateCartDisplay = updateCartDisplay;
        window.purchaseWaste = purchaseWaste;
        window.clearCart = clearCart;
    </script>
</body>
</html>
