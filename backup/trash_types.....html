                { name: 'A4', symbol: 'กระดาษขาว-ดำ', category: 'กระดาษ', price: 3.60, change: 8.50, week: 3.65, month: 3.70, year: '25,000', icon: '📄', color: '#FF9800' },
                { name: 'PVC', symbol: 'ท่อสีฟ้า', category: 'พลาสติก', price: 1.50, change: -5.20, week: 1.52, month: 1.55, year: '12,000', icon: '🔌', color: '#9C27B0' },
                { name: 'Glass', symbol: 'ขวดแก้ว', category: 'แก้ว', price: 1, change: 0, week: 1, month: 1, year: '8,000', icon: '🍾', color: '#2196F3' },
            ]
        };

        let currentTab = 'today';

        function renderTable() {
            const container = document.getElementById('cardsContainer');
            const data = rankingData[currentTab];
            
            const periodText = {
                'today': 'วันนี้',
                'week': 'สัปดาห์',
                'month': 'เดือน',
                'year': 'ปี'
            };
            
            const rows = data.map((item, index) => {
                const changeClass = item.change >= 0 ? 'positive' : 'negative';
                const changeSymbol = item.change >= 0 ? '+' : '';
                
                return `
                    <tr>
                        <td>
                            <div class="token-cell">
                                <div class="token-icon" style="background: ${item.color};">${item.icon}</div>
                                <div>
                                    <div class="token-name">${item.symbol}</div>
                                    <div class="token-symbol">${item.name}</div>
                                </div>
                            </div>
                        </td>
                        <td>${item.category}</td>
                        <td class="price-value">${item.price.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td>${typeof item.week === 'number' ? item.week.toLocaleString('th-TH', {minimumFractionDigits: 2}) : item.week}</td>
                        <td>${typeof item.month === 'number' ? item.month.toLocaleString('th-TH', {minimumFractionDigits: 2}) : item.month}</td>
                        <td>${item.year}</td>
                        <td class="change ${changeClass}">${changeSymbol}${item.change}%</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="table-container">
                    <div class="table-header-section">
                        <span>🗂️ รายการขยะตามประเภท - ${periodText[currentTab]}</span>
                        <div class="header-controls">
                            <select class="dropdown" id="categoryFilter">
                                <option value="all">ทุกหมวดหมู่</option>
                                <option value="พลาสติก">พลาสติก</option>
                                <option value="กระดาษ">กระดาษ</option>
                                <option value="โลหะ">โลหะ</option>
                                <option value="แก้ว">แก้ว</option>
                            </select>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ชื่อ</th>
                                <th>หมวดหมู่</th>
                                <th>ราคา<div style="font-size: 10px;">/กก.</div></th>
                                <th>สัปดาห์</th>
                                <th>เดือน</th>
                                <th>ปี</th>
                                <th>การเปลี่ยนแปลง</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn">...</button>
                        <button class="page-btn">10</button>
                    </div>
                </div>
            `;

            // Pagination handlers
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.textContent === '...') return;
                    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Category filter
            document.getElementById('categoryFilter')?.addEventListener('change', function(e) {
                // ในการใช้งานจริง จะกรองข้อมูลตามหมวดหมู่ที่เลือก
                console.log('Filter by:', e.target.value);
            });
        }

        // Sub-tab handlers
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                currentTab = this.dataset.period;
                renderTable();
            });
        });

        // Initial render
        renderTable();
    </script>
</body>
</html>
